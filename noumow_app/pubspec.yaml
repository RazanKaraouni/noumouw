name: noumouw_parent
description: Noumouw — parent app for families (mobile). Not the web staff console (`website/`).
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.3.4
  # OpenStreetMap stack. On Flutter 3.13 / Dart 3.1 you need the versions below;
  # after upgrading Flutter (≈3.22+), you can match the prompt’s stack:
  #   flutter_map: ^7.0.0
  #   geolocator: ^13.0.0
  #   permission_handler: ^11.0.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  geolocator: ^11.1.0
  permission_handler: ^11.3.1
  http: ^1.1.0
  cached_network_image: ^3.3.1
  shared_preferences: ^2.3.5
  video_player: ^2.7.0
  collection: ^1.17.2
  video_player_android: ^2.7.17
  flutter_dotenv: ^6.0.1
  google_generative_ai: ^0.4.6
  flutter_widget_from_html_core: ^0.17.2
  socket_io_client: ^2.0.3+1
  url_launcher: ^6.3.1
  flutter_secure_storage: ^9.2.4
  easy_localization: ^3.0.7
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  image_picker: ^1.0.8
  firebase_core: ^3.8.1
  firebase_messaging: ^15.2.4
  flutter_local_notifications: ^18.0.1
dependency_overrides:
  # 1.2.0 calls ImageLoader.createImageCodecFromUrl (removed in newer Flutter web). 1.3.x needs `web` ^1.0 (SDK pins 0.1.x).
  cached_network_image_web: 1.1.1
  # win32 <5.5 uses UnmodifiableUint8ListView removed in Dart 3.5+; 6.x breaks older path_provider_windows.
  win32: ^5.5.4
  # v1 embedding removed in Flutter 3.29+; older transitive pins break Android builds.
  flutter_plugin_android_lifecycle: ^2.0.35
  path_provider_android: 2.2.18
  shared_preferences_android: ^2.4.0
  url_launcher_android: ^6.3.20
  sqflite_android: ^2.4.0
  sqflite: ^2.4.3
  permission_handler_android: ^12.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/app.env
    - assets/translations/
    - assets/welcome.mp4
    - assets/images/
dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/images/logoversion7.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/images/logoversion7.png